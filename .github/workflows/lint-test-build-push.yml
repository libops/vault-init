name: build-push

on:
  workflow_call:
    secrets:
      GCLOUD_OIDC_POOL:
        required: false
      GSA:
        required: false
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
          go mod tidy -diff

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: check

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2

      - name: Test
        run: go test -race ./...

  image-check:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve native platform
        id: platform
        run: |
          set -euo pipefail
          case "$RUNNER_ARCH" in
            X64) platform=amd64 ;;
            ARM64) platform=arm64 ;;
            *) echo "Unsupported runner architecture: $RUNNER_ARCH" >&2; exit 1 ;;
          esac
          echo "name=$platform" >> "$GITHUB_OUTPUT"

      - name: Build native image without credentials
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          platforms: linux/${{ steps.platform.outputs.name }}
          provenance: false
          push: false
          tags: vault-init:ci-${{ steps.platform.outputs.name }}

      - name: Scan native image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: vault-init:ci-${{ steps.platform.outputs.name }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

  build-push:
    if: always() && github.event_name == 'pull_request'
    needs:
      - test
      - image-check
    uses: libops/.github/.github/workflows/pr-status.yaml@d5a29840172a53729c5999832534de65b7ba9587
    permissions: {}
    with:
      needs-json: ${{ toJSON(needs) }}

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    uses: libops/.github/.github/workflows/build-push.yaml@d5a29840172a53729c5999832534de65b7ba9587
    with:
      ref: ${{ github.sha }}
      expected-main-sha: ${{ github.ref == 'refs/heads/main' && github.sha || '' }}
      additional-gar-registry: us-docker.pkg.dev/libops-images/public
      scan: true
      sign: true
      certificate-identity: https://github.com/libops/.github/.github/workflows/build-push.yaml@d5a29840172a53729c5999832534de65b7ba9587
    permissions:
      contents: read
      id-token: write
      packages: write
    secrets:
      GCLOUD_OIDC_POOL: ${{ secrets.GCLOUD_OIDC_POOL }}
      GSA: ${{ secrets.GSA }}
